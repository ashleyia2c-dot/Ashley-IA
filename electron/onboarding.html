<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ashley — Initial setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* v0.16.14 — restyle: boutique noir matching la app principal.
       Antes: negro + rosa fucsia + Segoe UI plano (estilo dev).
       Ahora: vinos profundos + ámbar dorado + Cormorant Garamond
       serif para "Ashley" branding. Mismas decisiones que el chat
       principal para que el user sienta continuidad desde el
       primer momento. */
    * { box-sizing: border-box; }

    :root {
      --bg-deep:      #0d060a;
      --bg-panel:     rgba(30, 14, 22, 0.55);
      --bg-input:     rgba(15, 7, 12, 0.85);
      --border-soft:  rgba(212, 163, 115, 0.18);
      --border-mid:   rgba(212, 163, 115, 0.32);
      --border-hot:   rgba(232, 202, 158, 0.55);
      --text-bright:  #f5ebd5;
      --text-mid:     #c4b3a4;
      --text-soft:    #8a7a6b;
      --accent:       #e8ca9e;
      --accent-warm:  #d4a373;
      --shadow-deep:  0 12px 48px rgba(0, 0, 0, 0.65);
    }

    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text-bright);
      padding: 32px 38px 28px;
      user-select: none;
      height: 100vh;
      overflow-y: auto;
      position: relative;
      letter-spacing: 0.005em;
    }

    /* Capas de luz ambient — réplica suave del estilo del main app */
    body::before {
      content: '';
      position: fixed;
      top: -20vh; left: -10vw;
      width: 70vw; height: 70vh;
      background: radial-gradient(ellipse,
        rgba(212,163,115,0.16) 0%,
        rgba(212,163,115,0.06) 40%,
        transparent 65%);
      filter: blur(35px);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -15vh; right: -10vw;
      width: 60vw; height: 60vh;
      background: radial-gradient(ellipse,
        rgba(140, 60, 70, 0.12) 0%,
        rgba(140, 60, 70, 0.05) 40%,
        transparent 65%);
      filter: blur(35px);
      pointer-events: none;
      z-index: 0;
    }

    /* Todo el contenido encima de los glows */
    .lang-toggle, h1, .subtitle, section, .actions {
      position: relative;
      z-index: 1;
    }

    .lang-toggle {
      position: absolute;
      top: 18px;
      right: 22px;
      display: flex;
      gap: 2px;
      background: rgba(20, 8, 14, 0.7);
      border: 1px solid var(--border-soft);
      border-radius: 99px;
      padding: 3px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .lang-toggle button {
      background: transparent;
      border: none;
      color: var(--text-soft);
      padding: 5px 12px;
      font-size: 10.5px;
      font-weight: 600;
      border-radius: 99px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: color 0.18s ease, background 0.18s ease;
      font-family: inherit;
    }
    .lang-toggle button:hover { color: var(--text-mid); }
    .lang-toggle button.active {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 100%);
      color: var(--bg-deep);
    }

    h1 {
      margin: 0 0 4px;
      color: var(--accent);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 38px;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.1;
      text-shadow: 0 2px 24px rgba(232, 202, 158, 0.18);
    }
    .subtitle {
      color: var(--text-soft);
      font-size: 12.5px;
      margin-bottom: 26px;
      letter-spacing: 0.04em;
      font-style: italic;
    }

    section {
      background: var(--bg-panel);
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.28),
                  inset 0 1px 0 rgba(232, 220, 196, 0.04);
    }
    section h2 {
      margin: 0 0 12px;
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }

    .perm-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-mid);
    }
    .perm-list li {
      padding: 3px 0 3px 22px;
      position: relative;
    }
    .perm-list li::before {
      content: "◆";
      color: var(--accent-warm);
      position: absolute;
      left: 0;
      font-size: 9px;
      top: 9px;
      opacity: 0.85;
    }

    .privacy {
      font-size: 12.5px;
      color: var(--text-mid);
      line-height: 1.6;
    }
    .privacy strong { color: var(--text-bright); font-weight: 600; }

    label {
      display: block;
      font-size: 12.5px;
      margin-bottom: 10px;
      color: var(--text-mid);
      letter-spacing: 0.01em;
    }
    label code {
      background: rgba(232, 202, 158, 0.1);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'Consolas', 'SF Mono', monospace;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      color: var(--text-bright);
      font-size: 13px;
      font-family: 'Consolas', 'SF Mono', monospace;
      user-select: text;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 0.02em;
    }
    input::placeholder { color: var(--text-soft); opacity: 0.6; }
    input:focus {
      outline: none;
      border-color: var(--border-hot);
      box-shadow: 0 0 0 3px rgba(232, 202, 158, 0.08);
    }

    .hint {
      font-size: 11.5px;
      color: var(--text-soft);
      margin-top: 8px;
      line-height: 1.55;
    }
    .hint a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      border-bottom: 1px dotted rgba(232, 202, 158, 0.4);
      transition: color 0.18s ease, border-color 0.18s ease;
    }
    .hint a:hover {
      color: #f5ebd5;
      border-bottom-color: var(--accent);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      padding: 11px 22px;
      border: none;
      border-radius: 10px;
      font-size: 12.5px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    button.primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 100%);
      color: var(--bg-deep);
      box-shadow: 0 4px 18px rgba(232, 202, 158, 0.25),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    button.primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(232, 202, 158, 0.35),
                  inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }
    button.primary:active:not(:disabled) { transform: translateY(0); }
    button.primary:disabled {
      background: rgba(40, 28, 22, 0.6);
      color: var(--text-soft);
      cursor: not-allowed;
      box-shadow: none;
    }

    button.secondary {
      background: transparent;
      color: var(--text-mid);
      border: 1px solid var(--border-mid);
    }
    button.secondary:hover {
      background: rgba(212, 163, 115, 0.06);
      color: var(--text-bright);
      border-color: var(--border-hot);
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.5;
    }
    .checkbox-row input[type="checkbox"] {
      margin-top: 2px;
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .checkbox-row label { margin: 0; cursor: pointer; }

    /* Custom scrollbar warm */
    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb {
      background: rgba(212, 163, 115, 0.18);
      border-radius: 6px;
    }
    body::-webkit-scrollbar-thumb:hover {
      background: rgba(212, 163, 115, 0.32);
    }

    /* Fade-in suave de la página entera */
    body { animation: pageEnter 0.5s ease-out; }
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

    <div class="hint" id="key-hint"></div>

    <div class="checkbox-row">
      <input type="checkbox" id="skip-key">
      <label for="skip-key" id="skip-label" style="margin:0;"></label>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="accept-terms">
      <label for="accept-terms" id="terms-label" style="margin:0;"></label>
    </div>
  </section>

    <button class="secondary" id="cancel"></button>
    <button class="primary" id="submit" disabled></button>

    let currentLang = "en";

    function apply(lang) {
      currentLang = lang;
      const S = STRINGS[lang];
      const titleSuffix = {
        en: 'Initial setup', es: 'Configuración inicial', fr: 'Configuration initiale',
        ja: '初回セットアップ', de: 'Erste Einrichtung',
        ru: 'Первоначальная настройка', ko: '최초 설정',
      };
      document.title = S.docTitle + " — " + (titleSuffix[lang] || titleSuffix.en);
      document.getElementById('title').textContent = S.docTitle;
      document.getElementById('subtitle').textContent = S.subtitle;
      document.getElementById('h-perms').textContent = S.hPerms;
      document.getElementById('h-privacy').textContent = S.hPrivacy;
      document.getElementById('h-key').textContent = S.hKey;
      document.getElementById('privacy-text').innerHTML = S.privacy;
      document.getElementById('key-label').innerHTML = S.keyLabel;
      document.getElementById('key-hint').innerHTML = S.keyHint;
      document.getElementById('skip-label').textContent = S.skipLabel;
      document.getElementById('terms-label').textContent = S.termsLabel;
      document.getElementById('cancel').textContent = S.cancel;
      document.getElementById('submit').textContent = S.submit;

      // Repopulate perm list
      const ul = document.getElementById('perm-list');
      ul.innerHTML = '';
      for (const p of S.perms) {
        const li = document.createElement('li');
        li.textContent = p;
        ul.appendChild(li);
      }

      // Rewire links — xAI key + OpenRouter key
      const link = document.getElementById('get-key-link');
      if (link) {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          window.open('https://console.x.ai');
        });
      }
      const orLink = document.getElementById('get-or-key-link');
      if (orLink) {
        orLink.addEventListener('click', (e) => {
          e.preventDefault();
          window.open('https://openrouter.ai');
        });
      }

      // Update toggle active state
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-es').classList.toggle('active', lang === 'es');
      document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
      document.getElementById('btn-ja').classList.toggle('active', lang === 'ja');
      document.getElementById('btn-de').classList.toggle('active', lang === 'de');
      document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
      document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');

      document.documentElement.lang = lang;
    }

    document.getElementById('btn-en').addEventListener('click', () => apply('en'));
    document.getElementById('btn-es').addEventListener('click', () => apply('es'));
    document.getElementById('btn-fr').addEventListener('click', () => apply('fr'));
    document.getElementById('btn-ja').addEventListener('click', () => apply('ja'));
    document.getElementById('btn-de').addEventListener('click', () => apply('de'));
    document.getElementById('btn-ru').addEventListener('click', () => apply('ru'));
    document.getElementById('btn-ko').addEventListener('click', () => apply('ko'));

    const keyInput = document.getElementById('api-key');
    const acceptBox = document.getElementById('accept-terms');
    const skipBox = document.getElementById('skip-key');
    const submitBtn = document.getElementById('submit');
    const cancelBtn = document.getElementById('cancel');

    function validate() {
      // v0.16.14 — el user puede:
      //   A) pegar una clave (xAI o OpenRouter) + aceptar términos, O
      //   B) marcar "skip key" (irá a Ollama) + aceptar términos.
      // Aceptamos ambas claves: xAI (xai-...) y OpenRouter (sk-or-...).
      // El validador solo comprueba que la clave parece razonable, no
      // valida formato exacto del provider.
      const key = keyInput.value.trim();
      const skip = skipBox.checked;
      const keyLooksOk = key.length >= 20 && /^[A-Za-z0-9_\-]+$/.test(key);
      const canSubmit = (skip || keyLooksOk) && acceptBox.checked;
      submitBtn.disabled = !canSubmit;

      // UX: si marca skip, el input se deshabilita visualmente
      keyInput.disabled = skip;
      keyInput.style.opacity = skip ? '0.4' : '1';
    }

    keyInput.addEventListener('input', validate);
    acceptBox.addEventListener('change', validate);
    skipBox.addEventListener('change', validate);

    submitBtn.addEventListener('click', () => {
      const skip = skipBox.checked;
      const key = keyInput.value.trim();
      // Si skip está marcado, mandamos apiKey vacío. main.js lo trata
      // como "user va a usar Ollama" — aún se completa el onboarding.
      if (!skip && !key) return;
      window.ashleyAPI.submit({
        apiKey: skip ? '' : key,
        language: currentLang,
        skipKey: skip,
      });
    });

    cancelBtn.addEventListener('click', () => {
      window.ashleyAPI.cancel();
    });

    // Initial render: English default
    apply('en');
  </script>
