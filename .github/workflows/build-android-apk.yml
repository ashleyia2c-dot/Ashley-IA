# ════════════════════════════════════════════════════════════════════
#  Build Ashley Mobile APK (Android, vía Capacitor)
#
#  Trigger: manual (workflow_dispatch) o push de tag v* en mobile-app/
#  Output: artifact `ashley-mobile-debug.apk` descargable desde Actions
#
#  Para distribución a usuarios sin Play Store:
#    1. GitHub Action corre en cada push de tag mobile-vX.Y.Z
#    2. APK debug aparece en Releases del repo
#    3. User descarga, abre en Android, instala
#       (necesita activar "Orígenes desconocidos" en Settings)
#
#  Para Play Store en el futuro: necesitarás firmar con keystore propio
#  (no debug). Configurar GitHub Secret KEYSTORE_BASE64 + secrets de pwd.
# ════════════════════════════════════════════════════════════════════

name: Build Ashley Mobile APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'mobile-v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    # Sin esto, GITHUB_TOKEN solo tiene permiso de read y
    # softprops/action-gh-release falla con "Resource not accessible by
    # integration" al intentar crear el Release.
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # NO cache: el primer build no tiene package-lock.json (se genera
          # con `npm install`). actions/setup-node falla si pides cache de un
          # path que no existe. Tras el primer build podemos commitear el
          # lock y reactivar el cache si queremos optimizar.

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: mobile-app
        run: npm install

      - name: Sync PWA assets to Capacitor www/
        working-directory: mobile-app
        run: npm run sync-assets

      - name: Add Android platform (if missing)
        working-directory: mobile-app
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Inject custom MainActivity (camera permission delegate)
        working-directory: mobile-app
        run: |
          # El MainActivity.java por defecto de Capacitor NO override
          # el WebChromeClient.onPermissionRequest. Sin este override,
          # navigator.mediaDevices.getUserMedia() (lo que usa el QR scanner)
          # falla con "Permission denied" sin siquiera mostrar el dialog
          # del sistema. Reemplazamos por uno que grant automático.
          PKG_PATH="android/app/src/main/java/com/ashleyia/mobile"
          mkdir -p "$PKG_PATH"
          cp android-overrides/MainActivity.java "$PKG_PATH/MainActivity.java"
          echo "✓ MainActivity.java sobreescrito con WebChromeClient permission delegate"
          cat "$PKG_PATH/MainActivity.java" | head -5

      - name: Ensure CAMERA + RECORD_AUDIO permissions in manifest
        working-directory: mobile-app
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "❌ AndroidManifest.xml not found at $MANIFEST"
            exit 1
          fi
          echo "--- Manifest BEFORE: ---"
          cat "$MANIFEST"

          # awk insert tras la línea <manifest ...> (siempre la primera).
          # Usamos awk en lugar de sed porque <application> en Capacitor tiene
          # atributos en líneas siguientes (newline tras la palabra), y sed
          # con el patrón "<application " (espacio) NO matcheaba → permisos
          # no se añadían (bug real del run #6).
          if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
            awk '/<manifest/ && !done {
                print
                print "    <uses-permission android:name=\"android.permission.CAMERA\" />"
                done=1
                next
              } 1' "$MANIFEST" > "$MANIFEST.tmp" && mv "$MANIFEST.tmp" "$MANIFEST"
            echo "✓ Añadido CAMERA"
          fi
          if ! grep -q "android.permission.RECORD_AUDIO" "$MANIFEST"; then
            awk '/<manifest/ && !done {
                print
                print "    <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />"
                done=1
                next
              } 1' "$MANIFEST" > "$MANIFEST.tmp" && mv "$MANIFEST.tmp" "$MANIFEST"
            echo "✓ Añadido RECORD_AUDIO"
          fi

          echo "--- Manifest AFTER: ---"
          cat "$MANIFEST"
          echo "--- Permissions found: ---"
          grep "uses-permission" "$MANIFEST" || (echo "❌ NO permissions in manifest!" && exit 1)
          # Hard-fail si CAMERA no acabó en el manifest
          grep -q "android.permission.CAMERA" "$MANIFEST" || (echo "❌ CAMERA permission missing!" && exit 1)

      - name: Replace default app icon with ashley_pfp.jpg
        working-directory: mobile-app
        run: |
          # Capacitor genera un icono default genérico al hacer cap add android.
          # Lo reemplazamos por la imagen de Ashley en todos los tamaños mipmap
          # estándar de Android. ImageMagick está pre-instalado en runners
          # ubuntu-latest de GitHub.
          PFP="../assets/ashley_pfp.jpg"
          RES="android/app/src/main/res"

          if [ ! -f "$PFP" ]; then
            echo "⚠ ashley_pfp.jpg no encontrado en assets/, skipping icon replace"
            exit 0
          fi

          # Comando: 'magick' (IM 7+) o 'convert' (IM 6, deprecated)
          if command -v magick >/dev/null 2>&1; then
            CMD="magick"
          elif command -v convert >/dev/null 2>&1; then
            CMD="convert"
          else
            echo "⚠ ImageMagick no disponible, skipping icon replace"
            exit 0
          fi

          # Tamaños mipmap estándar Android (densidad → dimensión px)
          declare -A SIZES=(
            ["mdpi"]="48"
            ["hdpi"]="72"
            ["xhdpi"]="96"
            ["xxhdpi"]="144"
            ["xxxhdpi"]="192"
          )

          for density in "${!SIZES[@]}"; do
            size="${SIZES[$density]}"
            dir="$RES/mipmap-$density"
            mkdir -p "$dir"
            # Generamos PNG cuadrado (Android los recorta a círculo si la
            # device es adaptive). El recorte fitness es para que la cara
            # de Ashley quede centrada y no se corte.
            $CMD "$PFP" -resize "${size}x${size}^" -gravity center -extent "${size}x${size}" "$dir/ic_launcher.png"
            $CMD "$PFP" -resize "${size}x${size}^" -gravity center -extent "${size}x${size}" "$dir/ic_launcher_round.png"
            # Foreground para adaptive icon (Android 8+) — debe ser 108dp
            # con safe zone de 66dp, por eso resize a 1.5x el size base
            adaptive_size=$((size * 3 / 2))
            $CMD "$PFP" -resize "${adaptive_size}x${adaptive_size}^" -gravity center -extent "${adaptive_size}x${adaptive_size}" "$dir/ic_launcher_foreground.png" 2>/dev/null || true
          done

          echo "✓ Iconos generados desde ashley_pfp.jpg en todos los tamaños mipmap"
          ls -la "$RES/mipmap-xxxhdpi/" 2>&1 | head -5

      - name: Make gradlew executable
        working-directory: mobile-app/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          APK="mobile-app/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "❌ APK not found at $APK"
            find mobile-app/android -name "*.apk" 2>&1 || true
            exit 1
          fi
          echo "✓ APK found: $(ls -lh $APK)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ashley-mobile-debug-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
          body: |
            ## Ashley Mobile APK (Android)

            APK debug — instalable directamente sin Play Store.

            ### Instalación

            1. Descarga `app-debug.apk` de los assets de abajo
            2. Transfiere al móvil (USB, Telegram, Drive, etc.)
            3. En Android: Settings → Security → "Permitir orígenes desconocidos"
            4. Tap en el APK descargado → Instalar
            5. Abre Ashley → Escanea QR de tu PC

            ### Notas

            - Requiere Ashley desktop corriendo en el mismo WiFi (o Tailscale)
            - Auto-update no funciona en debug APK (instala el nuevo manualmente)
            - Para distribución masiva: subiremos a Play Store en v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
