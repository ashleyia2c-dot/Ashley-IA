# Compila Ashley y publica el instalador (.exe) como GitHub Release.
#
# Cómo disparar una nueva release:
#   1. Bumpear la versión en electron/package.json ("version": "0.9.1")
#   2. git add electron/package.json
#   3. git commit -m "Release v0.9.1"
#   4. git tag v0.9.1        ← el "v" delante es obligatorio
#   5. git push
#   6. git push --tags       ← esto es lo que dispara esta Action
#
# GitHub Actions:
#   - Checkout del código
#   - Instala Python 3.12 + crea venv + instala requirements.txt (← v0.19.0:
#     ESENCIAL — sin esto, prebuild.js falla porque no encuentra reflex.exe.
#     Tanto v0.17.4 como v0.18.0 pidieron release y se quedaron a medias por
#     este bug. Ahora arreglado.)
#   - Instala Node 20
#   - Instala deps de electron
#   - Corre electron-builder con --publish always
#     → sube latest.yml + Ashley-Setup-<ver>.exe al Release correspondiente
#   - Publica el Release en modo draft (lo revisás y le das "Publish")
#
# electron-updater en Ashley consulta este Release y descarga el .exe
# cuando detecta que hay versión nueva.

name: Release

on:
  push:
    tags:
      - 'v*'   # v0.9.0, v0.9.1, v1.0.0, etc.

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write   # necesario para crear el Release y subir assets

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          lfs: false  # VRM (47MB) y otros assets binarios no usan LFS aún

      - name: Setup Python 3.12 (host runner — solo para correr el setup script)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.10'  # debe coincidir con PYTHON_VERSION en setup_python_embed.py
          cache: 'pip'

      - name: Setup Python embeddable distribution
        # v0.19.2 — sustituye al venv tradicional. tools/setup_python_embed.py
        # descarga el zip embeddable de python.org, instala pip, instala
        # requirements.txt al site-packages embebido. Resultado: python-embed/
        # 100% portable, funciona en cualquier Windows x64 sin Python preinstalado.
        # Causa raíz que esto arregla: el venv tradicional graba paths absolutos
        # en pyvenv.cfg + python.exe shim, así que al bundlearlo en el installer
        # y desplegarlo en otro PC daba "No Python at C:\hostedtoolcache\..."
        shell: pwsh
        run: python tools/setup_python_embed.py

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install electron dependencies
        working-directory: ./electron
        run: npm install

      - name: Build & publish release
        working-directory: ./electron
        env:
          # Token automático de GitHub — permite a electron-builder crear/actualizar
          # la Release y subirle assets sin que tengamos que generar nada.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
