<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ashley 3D Widget</title>
  <style>
    html, body {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
      /* Fondo boutique noir — gradient cálido de la app */
      background:
        radial-gradient(ellipse at center 30%, rgba(120, 60, 40, 0.45) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 80%, rgba(60, 20, 30, 0.30) 0%, transparent 70%),
        linear-gradient(180deg, #1f0d14 0%, #0a0408 100%);
    }
    #canvas-container {
      width: 100%; height: 100%;
      position: relative;
    }
    #canvas-container canvas { display: block; width: 100%; height: 100%; }
    #loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(212, 163, 115, 0.6);
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      pointer-events: none;
    }
    .err {
      position: absolute; inset: 10px;
      color: #c97373; font-size: 10px; font-family: monospace;
      background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px;
      overflow: auto;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.166.1",
      "three/addons/": "https://esm.sh/three@0.166.1/examples/jsm/",
      "@pixiv/three-vrm": "https://esm.sh/@pixiv/three-vrm@3.1.4?deps=three@0.166.1&external=three"
    }
  }
  </script>
</head>
<body>
<div id="canvas-container">
  <div id="loading">cargando ashley…</div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin } from '@pixiv/three-vrm';

const PI = Math.PI;
const VRM_URL = './3d/ashley.vrm';

const REST_POSE = {
  rightUpperArm: { z: PI * 0.40, y: -PI * 0.04 },
  leftUpperArm:  { z: -PI * 0.40, y:  PI * 0.04 },
  rightLowerArm: { y: PI * 0.10 },
  leftLowerArm:  { y: -PI * 0.10 },
};

const POSES = {
  default: {},
  excited: {
    rightUpperArm: { x: PI * 0.167, y: -PI * 0.044, z: PI * 0.400 },
    rightLowerArm: { x: PI * 0.100, y: PI * 0.294 },
    rightHand:     { x: -PI * 0.222, y: -PI * 0.078, z: PI * 0.044 },
    leftUpperArm:  { x: -PI * 0.128, y: PI * 0.040, z: -PI * 0.400 },
    leftLowerArm:  { x: -PI * 0.022, y: -PI * 0.889, z: -PI * 0.056 },
    leftHand:      { x: -PI * 0.244, y: PI * 0.072, z: PI * 0.394 },
    head:          { y: -PI * 0.006, z: -PI * 0.056 },
  },
  tsundere: {
    rightShoulder: { x: -PI * 0.022, y: PI * 0.017, z: -PI * 0.128 },
    rightUpperArm: { x: PI * 0.156, y: -PI * 0.028, z: PI * 0.394 },
    rightLowerArm: { x: PI * 0.189, y: PI * 0.400, z: PI * 0.128 },
    rightHand:     { x: PI * 0.033, y: PI * 0.411, z: -PI * 0.200 },
    rightThumbMetacarpal:    { x: PI * 0.022, y: -PI * 0.156, z: -PI * 0.128 },
    rightThumbProximal:      { x: PI * 0.050, y: -PI * 0.100, z: PI * 0.228 },
    rightIndexProximal:      { x: -PI * 0.350, y: -PI * 0.117, z: -PI * 0.033 },
    rightIndexIntermediate:  { y: -PI * 0.033 },
    rightMiddleProximal:     { x: PI * 0.017, y: -PI * 0.100, z: PI * 0.194 },
    rightRingProximal:       { x: -PI * 0.028, y: -PI * 0.128, z: PI * 0.267 },
    rightLittleProximal:     { z: PI * 0.367 },
    leftUpperArm:  { x: PI * 0.100, y: PI * 0.040, z: -PI * 0.372 },
    leftLowerArm:  { x: -PI * 0.150, y: PI * 0.006, z: -PI * 0.156 },
    leftHand:      { x: PI * 0.033, y: -PI * 0.056 },
    rightUpperLeg: { x: -PI * 0.006, y: -PI * 0.172, z: -PI * 0.033 },
    rightLowerLeg: { x: PI * 0.017, y: PI * 0.094, z: -PI * 0.022 },
    leftUpperLeg:  { x: -PI * 0.017, y: PI * 0.072, z: PI * 0.078 },
    leftLowerLeg:  { x: PI * 0.100, z: PI * 0.022 },
  },
  proud: {
    head: { x: PI * 0.001, y: PI * 0.002 },
    rightShoulder: { x: -PI * 0.022, y: PI * 0.028, z: -PI * 0.106 },
    rightUpperArm: { x: PI * 0.117, y: -PI * 0.017, z: PI * 0.583 },
    rightLowerArm: { x: PI * 0.100, y: PI * 0.050, z: -PI * 0.117 },
    rightHand:     { x: -PI * 0.217, y: PI * 0.017, z: -PI * 0.261 },
    rightIndexProximal:      { x: -PI * 0.144, y: -PI * 0.322, z: PI * 0.206 },
    rightIndexIntermediate:  { y: -PI * 0.633, z: PI * 0.106 },
    rightMiddleProximal:     { x: -PI * 0.239, y: -PI * 0.294, z: PI * 0.150 },
    rightMiddleIntermediate: { y: -PI * 0.617, z: PI * 0.067 },
    rightRingProximal:       { x: -PI * 0.222, y: -PI * 0.289, z: PI * 0.150 },
    rightRingIntermediate:   { x: -PI * 0.022, y: -PI * 0.633, z: PI * 0.072 },
    rightLittleProximal:     { x: PI * 0.144, z: PI * 0.367 },
    rightLittleIntermediate: { x: PI * 0.006, y: -PI * 0.050, z: PI * 0.711 },
    leftShoulder: { x: PI * 0.094 },
    leftUpperArm:  { x: -PI * 0.033, y: PI * 0.040, z: -PI * 0.372 },
    leftLowerArm:  { x: -PI * 0.433, z: -PI * 0.811 },
    leftHand:      { x: PI * 0.272, y: -PI * 0.156, z: PI * 0.267 },
  },
  embarrassed: {
    head: { x: -PI * 0.08, z: -PI * 0.03 },
    expressions: { sorrow: 0.40, relaxed: 0.15, blink: 0.30 },
  },
  surprised: {
    head: { x: PI * 0.04 },
    expressions: { surprised: 0.80 },
  },
  soft: {
    head: { x: -PI * 0.04, y: PI * 0.02 },
    expressions: { relaxed: 0.35, happy: 0.25 },
  },
};

const MOOD_EXPRESSIONS = {
  default:     {},
  excited:     { happy: 0.7 },
  proud:       { happy: 0.4 },
  tsundere:    { angry: 0.2, sorrow: 0.05 },
  embarrassed: { sorrow: 0.4, relaxed: 0.2, blink: 0.3 },
  soft:        { relaxed: 0.35, happy: 0.25 },
  surprised:   { surprised: 0.8 },
};

const POSEABLE_BONES = [
  'head','neck','chest','spine','hips',
  'rightShoulder','rightUpperArm','rightLowerArm','rightHand',
  'leftShoulder','leftUpperArm','leftLowerArm','leftHand',
  'rightThumbMetacarpal','rightThumbProximal','rightThumbIntermediate','rightThumbDistal',
  'rightIndexProximal','rightIndexIntermediate','rightIndexDistal',
  'rightMiddleProximal','rightMiddleIntermediate','rightMiddleDistal',
  'rightRingProximal','rightRingIntermediate','rightRingDistal',
  'rightLittleProximal','rightLittleIntermediate','rightLittleDistal',
  'leftThumbMetacarpal','leftThumbProximal','leftThumbIntermediate','leftThumbDistal',
  'leftIndexProximal','leftIndexIntermediate','leftIndexDistal',
  'leftMiddleProximal','leftMiddleIntermediate','leftMiddleDistal',
  'leftRingProximal','leftRingIntermediate','leftRingDistal',
  'leftLittleProximal','leftLittleIntermediate','leftLittleDistal',
  'rightUpperLeg','rightLowerLeg','rightFoot',
  'leftUpperLeg','leftLowerLeg','leftFoot',
];

// ─── Three setup ─────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(28, container.clientWidth / container.clientHeight, 0.01, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x000000, 0);
container.appendChild(renderer.domElement);

// Luces tipo studio para que el shader MToon se vea bien
const ambient = new THREE.AmbientLight(0xffffff, 0.65);
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(1, 2, 1.5);
const fill = new THREE.DirectionalLight(0xffd5b3, 0.4);  // tono cálido (boutique noir)
fill.position.set(-1.5, 1, 0.5);
const rim = new THREE.DirectionalLight(0xff9a8a, 0.25);  // rim warm light
rim.position.set(0, 1, -2);
scene.add(ambient, dir, fill, rim);

// ─── PoseAnimator ────────────────────────────────────────────
class PoseAnimator {
  constructor(vrm) { this.vrm = vrm; this.transition = null; }
  get(n) { return this.vrm.humanoid?.getNormalizedBoneNode?.(n); }
  static easeInOutQuad(t) { return t < 0.5 ? 2*t*t : -1 + (4-2*t)*t; }
  transitionTo(targetPose, durationMs = 600) {
    const startBones = {};
    for (const b of POSEABLE_BONES) {
      const node = this.get(b);
      if (node) startBones[b] = node.quaternion.clone();
    }
    const startExprs = {};
    const exprMgr = this.vrm.expressionManager;
    if (exprMgr) for (const e of exprMgr.expressions) {
      const n = e.expressionName || e.name;
      if (n) startExprs[n] = exprMgr.getValue(n) || 0;
    }
    const targetBones = {};
    for (const b of POSEABLE_BONES) {
      let r = REST_POSE[b] || {x:0,y:0,z:0};
      if (targetPose[b]) r = targetPose[b];
      targetBones[b] = new THREE.Quaternion().setFromEuler(new THREE.Euler(r.x||0, r.y||0, r.z||0));
    }
    const targetExprs = {};
    if (exprMgr) {
      for (const e of exprMgr.expressions) {
        const n = e.expressionName || e.name;
        if (n) targetExprs[n] = 0;
      }
      if (targetPose.expressions) for (const [n,v] of Object.entries(targetPose.expressions)) targetExprs[n] = v;
    }
    this.transition = { start: performance.now(), duration: durationMs, startBones, targetBones, startExprs, targetExprs };
  }
  update() {
    if (!this.transition) return false;
    const tr = this.transition;
    const t = Math.min((performance.now() - tr.start) / tr.duration, 1);
    const eased = PoseAnimator.easeInOutQuad(t);
    const tmp = new THREE.Quaternion();
    for (const b of POSEABLE_BONES) {
      const node = this.get(b);
      if (!node) continue;
      const start = tr.startBones[b];
      const target = tr.targetBones[b];
      if (!start || !target) continue;
      tmp.copy(start).slerp(target, eased);
      node.quaternion.copy(tmp);
    }
    const exprMgr = this.vrm.expressionManager;
    if (exprMgr) for (const [n, tv] of Object.entries(tr.targetExprs)) {
      const sv = tr.startExprs[n] || 0;
      exprMgr.setValue(n, sv + (tv - sv) * eased);
    }
    if (t >= 1) { this.transition = null; return false; }
    return true;
  }
  isAnimating() { return this.transition !== null; }
}

let currentVrm = null;
let poseAnimator = null;
let cursorTarget = null;
let cursorNX = 0.5, cursorNY = 0.5;  // normalizadas 0-1 del PARENT viewport
let blinkPhase = 0, blinkTimer = 0, nextBlinkAt = 2 + Math.random()*4;

// ─── Lipsync — REAL (audio amplitude del bridge) + FAKE fallback ──
// Modo REAL: el bridge envía 'ashley3d:audioAmp' con amplitud RMS del audio
// TTS de Ashley en vivo. Usamos esa amplitud para la apertura de la boca.
// Modo FAKE: si data-talking=1 PERO no hay audio amp (TTS off, Web Speech),
// ciclamos visemes random. Audio real PRIMA siempre que esté disponible.
let isTalking = false;
let externalAmp = 0;       // amplitud real del audio (-1 hasta primer signal)
let externalAmpAt = 0;     // timestamp del último amp recibido (ms)
let visemeTimer = 0;
let nextVisemeAt = 0;
let currentViseme = null;
let visemeAmount = 0;
const VISEMES = ['aa', 'ih', 'ou', 'ee', 'oh'];

// ─── Head-follow del cursor (sutil, lerp suave) ───────────
let headFollowY = 0, headFollowX = 0;
const HEAD_FOLLOW_MAX_Y = 0.18;
const HEAD_FOLLOW_MAX_X = 0.08;
const HEAD_FOLLOW_LERP  = 0.05;

// ─── Eye saccades mientras habla ──────────────────────────
let saccadeOffsetX = 0, saccadeOffsetY = 0;
let nextSaccadeAt = 0, saccadeTimer = 0;

// ─── Proximity smile — Ashley sonríe cuando user acerca cursor ──
// El bridge envía proximity 0..1 con cada cursor message (0=lejos, 1=centro).
// Aplicamos esto como un boost suave de la expression 'happy' usando deltas
// (no setValue absoluto, así no pisamos el happy de la pose ni del end-boost).
let cursorProximity = 0;
let proximitySmile = 0;
let lastProximitySmile = 0;
const PROXIMITY_SMILE_MAX = 0.55; // visible cuando cursor encima — sonrisa clara

// ─── Expression emphasis al final del habla ──────────────
// Cuando termina el TTS, brevemente boost del expression del mood
// actual para "puntuar" emocionalmente lo que acaba de decir.
// (excited dice algo → boost happy 1s al terminar; tsundere → angry boost; etc.)
let endSpeechBoost = 0;     // 0..1 amplitude del boost actual
let endSpeechBoostAt = 0;   // timestamp cuando empezó (ms)
let pendingEndBoost = false; // marca para aplicar el boost cuando talking pasa de true→false

const idleBase = {
  spine: { x:0,y:0,z:0 }, chest: { x:0,y:0,z:0 },
  hips:  { x:0,y:0,z:0 }, head:  { x:0,y:0,z:0 }, neck: { x:0,y:0,z:0 },
};
function captureIdleBase() {
  if (!currentVrm) return;
  for (const b of Object.keys(idleBase)) {
    const node = currentVrm.humanoid?.getNormalizedBoneNode?.(b);
    if (node) {
      idleBase[b].x = node.rotation.x;
      idleBase[b].y = node.rotation.y;
      idleBase[b].z = node.rotation.z;
    }
  }
}

function applyRestPose(vrm) {
  for (const [bone, rot] of Object.entries(REST_POSE)) {
    const node = vrm.humanoid?.getNormalizedBoneNode?.(bone);
    if (node) {
      node.rotation.x = rot.x || 0;
      node.rotation.y = rot.y || 0;
      node.rotation.z = rot.z || 0;
    }
  }
}

const loader = new GLTFLoader();
loader.register((p) => new VRMLoaderPlugin(p));

loader.load(VRM_URL, (gltf) => {
  try {
    const vrm = gltf.userData.vrm;
    if (!vrm) throw new Error('VRM no extraído');
    scene.add(vrm.scene);
    currentVrm = vrm;

    const box = new THREE.Box3().setFromObject(vrm.scene);
    const h = box.getSize(new THREE.Vector3()).y;
    if (h > 3) vrm.scene.scale.setScalar(1.6 / h);

    cursorTarget = new THREE.Object3D();
    cursorTarget.position.set(0, 1.4, 5);
    scene.add(cursorTarget);
    if (vrm.lookAt) vrm.lookAt.target = cursorTarget;

    applyRestPose(vrm);
    captureIdleBase();
    poseAnimator = new PoseAnimator(vrm);

    setupTorsoCamera(vrm);

    document.getElementById('loading')?.remove();
    window.parent.postMessage({ type: 'ashley3d:ready' }, '*');
  } catch (e) {
    showError('post-load: ' + e.message);
  }
}, undefined, (err) => showError('GLTFLoader: ' + (err?.message || err)));

function setupTorsoCamera(vrm) {
  // Encuadre desde cintura hasta arriba de la cabeza, centrado horizontal
  const head = vrm.humanoid?.getNormalizedBoneNode?.('head');
  const chest = vrm.humanoid?.getNormalizedBoneNode?.('chest');
  const hips = vrm.humanoid?.getNormalizedBoneNode?.('hips');
  if (!head || !chest || !hips) return;
  const headPos = new THREE.Vector3(); head.getWorldPosition(headPos);
  const chestPos = new THREE.Vector3(); chest.getWorldPosition(chestPos);
  const hipsPos = new THREE.Vector3(); hips.getWorldPosition(hipsPos);

  // Target = entre chest y head pero ligeramente más arriba para incluir más cabeza
  const target = new THREE.Vector3();
  target.x = headPos.x;
  target.y = (chestPos.y + headPos.y) / 2 + 0.05;  // un poco arriba del centro
  target.z = headPos.z;

  // Distancia: encuadrar desde un poco abajo del chest hasta encima de la cabeza
  // Visible vertical = head.y - chest.y + ~0.4 (margen)
  const visibleH = (headPos.y - chestPos.y) * 2 + 0.4;
  const fovRad = camera.fov * Math.PI / 180;
  const dist = (visibleH / 2) / Math.tan(fovRad / 2);

  camera.position.set(target.x, target.y, target.z + dist);
  camera.lookAt(target);
}

function showError(msg) {
  document.getElementById('loading')?.remove();
  const div = document.createElement('div');
  div.className = 'err';
  div.textContent = '✗ ' + msg;
  container.appendChild(div);
}

// ─── Mensaje del parent ──────────────────────────────────────
window.addEventListener('message', (e) => {
  if (!e.data || typeof e.data !== 'object') return;
  switch (e.data.type) {
    case 'ashley3d:setMood':
      setMood(e.data.mood || 'default');
      break;
    case 'ashley3d:cursor':
      cursorNX = e.data.nx;
      cursorNY = e.data.ny;
      cursorProximity = e.data.proximity || 0;
      break;
    case 'ashley3d:setTalking': {
      const wasTalking = isTalking;
      isTalking = !!e.data.talking;
      if (!isTalking) {
        currentViseme = null;
        visemeAmount = 0;
        if (currentVrm?.expressionManager) {
          for (const v of VISEMES) currentVrm.expressionManager.setValue(v, 0);
        }
        // Talking acaba de terminar (true → false) → marcar para boost expression
        if (wasTalking) {
          pendingEndBoost = true;
        }
      } else {
        nextVisemeAt = 0;
        visemeTimer = 0;
      }
      break;
    }
    case 'ashley3d:audioAmp':
      // Real audio amplitude (0-1) del TTS via Web Audio API del bridge
      externalAmp = e.data.amp || 0;
      externalAmpAt = performance.now();
      break;
  }
});

let currentMood = 'default';
function setMood(mood) {
  if (!poseAnimator) return;
  currentMood = mood;
  let pose = POSES[mood];
  if (!pose) pose = { expressions: MOOD_EXPRESSIONS[mood] || {} };
  else if (!pose.expressions) pose = { ...pose, expressions: MOOD_EXPRESSIONS[mood] || {} };
  poseAnimator.transitionTo(pose, 500);
}

// ─── Animation loop (cap a 30fps para reducir CPU/GPU) ──────
// 30fps es suficiente para mouth/eyes/head idle. Halve el trabajo del
// iframe → menos lag en el parent durante streaming de Ashley.
const clock = new THREE.Clock();
let lastFrameAt = 0;
const FRAME_BUDGET_MS = 33;  // ~30fps cap
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  if (now - lastFrameAt < FRAME_BUDGET_MS) return;
  lastFrameAt = now;
  const delta = clock.getDelta();
  const time = clock.elapsedTime;

  if (currentVrm) {
    let isTransitioning = false;
    if (poseAnimator) {
      const wasActive = poseAnimator.isAnimating();
      isTransitioning = poseAnimator.update();
      if (wasActive && !isTransitioning) captureIdleBase();
    }

    if (!isTransitioning) {
      const spine = currentVrm.humanoid?.getNormalizedBoneNode?.('spine');
      const chest = currentVrm.humanoid?.getNormalizedBoneNode?.('chest');
      const hips  = currentVrm.humanoid?.getNormalizedBoneNode?.('hips');
      const head  = currentVrm.humanoid?.getNormalizedBoneNode?.('head');
      const breath = Math.sin(time * 1.4) * 0.05;
      if (spine) spine.rotation.x = idleBase.spine.x + breath * 0.5;
      if (chest) chest.rotation.x = idleBase.chest.x + breath;
      if (hips) {
        hips.rotation.y = idleBase.hips.y + Math.sin(time * 0.5) * 0.03;
        hips.rotation.z = idleBase.hips.z + Math.sin(time * 0.35) * 0.015;
      }

      // ── HEAD FOLLOW del cursor con lerp suave ──
      const headTargetY = (cursorNX - 0.5) * 2 * HEAD_FOLLOW_MAX_Y;
      const headTargetX = -(cursorNY - 0.5) * 2 * HEAD_FOLLOW_MAX_X;
      headFollowY += (headTargetY - headFollowY) * HEAD_FOLLOW_LERP;
      headFollowX += (headTargetX - headFollowX) * HEAD_FOLLOW_LERP;

      // ── HEAD SPEECH MOTION (bob/turn mientras habla) ──
      // Movimiento gestual visible — los humanos mueven la cabeza mientras
      // hablan para enfatizar palabras. 2 frecuencias por axis para evitar
      // loop visible. Amplitudes ~10° Y, ~6° X (notable pero natural).
      let headSpeechY = 0, headSpeechX = 0;
      if (isTalking) {
        headSpeechY = Math.sin(time * 1.7) * 0.10 + Math.sin(time * 2.6) * 0.05;
        headSpeechX = Math.sin(time * 2.3) * 0.06 + Math.sin(time * 1.1) * 0.03;
      }

      if (head) {
        // TODO additive: pose + idle + cursor follow + speech motion
        head.rotation.y = idleBase.head.y + Math.sin(time * 0.7) * 0.025 + headFollowY + headSpeechY;
        head.rotation.x = idleBase.head.x + Math.sin(time * 0.45) * 0.012 + headFollowX + headSpeechX;
      }
    }

    // ── Eye saccades durante el habla ──
    // Cada 300-700ms genera un nuevo offset random pequeño.
    // Lerp suave entre saccades para no jump bruscos visibles.
    if (isTalking) {
      saccadeTimer += delta;
      if (saccadeTimer >= nextSaccadeAt) {
        saccadeOffsetX = (Math.random() - 0.5) * 0.5;  // ±0.25
        saccadeOffsetY = (Math.random() - 0.5) * 0.3;  // ±0.15
        saccadeTimer = 0;
        nextSaccadeAt = 0.3 + Math.random() * 0.4;  // 300-700ms
      }
    } else {
      // Decay rápido cuando para de hablar
      saccadeOffsetX *= 0.92;
      saccadeOffsetY *= 0.92;
    }

    // Eye tracking — usa coords normalizadas (0-1) del parent + saccades
    if (cursorTarget) {
      const x = (cursorNX - 0.5) * 2;
      const y = -(cursorNY - 0.5) * 2;
      cursorTarget.position.set(
        x * 1.5 + saccadeOffsetX,
        1.4 + y * 0.5 + saccadeOffsetY,
        1.5
      );
    }

    // ── Proximity smile — Ashley sonríe sutil cuando cursor cerca ──
    // Aplicamos como DELTA sobre el happy actual (no setValue absoluto)
    // para no pisar el happy de la pose ni el end-speech-boost.
    if (currentVrm?.expressionManager) {
      const targetSmile = cursorProximity * PROXIMITY_SMILE_MAX;
      proximitySmile += (targetSmile - proximitySmile) * 0.10;  // lerp 10%/frame ≈ ~120ms
      const delta = proximitySmile - lastProximitySmile;
      if (Math.abs(delta) > 0.001) {
        const cur = currentVrm.expressionManager.getValue('happy') || 0;
        currentVrm.expressionManager.setValue('happy', Math.max(0, Math.min(1, cur + delta)));
        lastProximitySmile = proximitySmile;
      }
    }

    // ── Expression boost al terminar el habla ──
    // Cuando ttsEnd dispara (talking pasa de true→false), brevemente
    // boost del expression del mood actual para "puntuar" emocionalmente.
    if (pendingEndBoost) {
      pendingEndBoost = false;
      endSpeechBoost = 1.0;
      endSpeechBoostAt = performance.now();
    }
    if (endSpeechBoost > 0.01 && currentVrm?.expressionManager) {
      const elapsed = (performance.now() - endSpeechBoostAt) / 1000;
      // Pulso más prolongado y visible: attack (200ms) → hold (700ms) → decay (1100ms)
      let envelope;
      if (elapsed < 0.2) envelope = elapsed / 0.2;
      else if (elapsed < 0.9) envelope = 1.0;
      else if (elapsed < 2.0) envelope = 1.0 - (elapsed - 0.9) / 1.1;
      else envelope = 0;
      endSpeechBoost = Math.max(0, envelope);

      // Determinar qué expression boostear basado en mood actual.
      // Si mood = 'default' (no hay pose mapped) usamos happy ligero como
      // fallback — mejor mostrar ALGO que cara plana al terminar de hablar.
      let boostExpr = MOOD_EXPRESSIONS[currentMood] || {};
      if (Object.keys(boostExpr).length === 0) {
        boostExpr = { happy: 0.40, relaxed: 0.20 };  // fallback default
      }
      for (const [name, baseVal] of Object.entries(boostExpr)) {
        if (name === 'blink') continue;
        const current = currentVrm.expressionManager.getValue(name) || 0;
        // Boost x2 (visible) — era 1.5x, demasiado sutil
        const target = Math.min(1, baseVal * 2.0);
        const boosted = current + (target - current) * endSpeechBoost;
        currentVrm.expressionManager.setValue(name, boosted);
      }
    }

    // ── LIPSYNC ─────────────────────────────────────────────
    // Real amp considerada "fresh" si llegó hace < 500ms
    // (sino el TTS ya terminó y damos el fake/silencio).
    const realAmpFresh = (performance.now() - externalAmpAt) < 500;

    if (currentVrm.expressionManager) {
      if (realAmpFresh && externalAmp > 0.01) {
        // ── MODO REAL: amplitud del audio TTS en vivo ──
        // Cambia el visema activo cada 80-150ms para tener variedad
        // visual, pero la AMPLITUD viene del audio real → sincro perfecta
        // con la voz de Ashley (boca abre cuando habla, cierra en silencio).
        visemeTimer += delta;
        if (!currentViseme || visemeTimer >= nextVisemeAt) {
          if (currentViseme) currentVrm.expressionManager.setValue(currentViseme, 0);
          const pool = currentViseme ? VISEMES.filter(v => v !== currentViseme) : VISEMES;
          currentViseme = pool[Math.floor(Math.random() * pool.length)];
          visemeTimer = 0;
          nextVisemeAt = 0.08 + Math.random() * 0.07;
        }
        // Boost ligero + clamp para que abra bien la boca al hablar fuerte
        const v = Math.min(1, externalAmp * 1.3);
        currentVrm.expressionManager.setValue(currentViseme, v);
        visemeAmount = v;
      } else if (isTalking && !realAmpFresh) {
        // ── MODO FAKE (fallback): random mientras Ashley genera/streamea
        // pero sin TTS audible (TTS off, Web Speech API, etc.) ──
        visemeTimer += delta;
        if (visemeTimer >= nextVisemeAt) {
          if (currentViseme) currentVrm.expressionManager.setValue(currentViseme, 0);
          const pool = currentViseme ? VISEMES.filter(v => v !== currentViseme) : VISEMES;
          currentViseme = pool[Math.floor(Math.random() * pool.length)];
          visemeAmount = 0.4 + Math.random() * 0.4;
          currentVrm.expressionManager.setValue(currentViseme, visemeAmount);
          visemeTimer = 0;
          nextVisemeAt = 0.10 + Math.random() * 0.10;
        }
      } else if (currentViseme) {
        // ── Fade out cuando NO talking + NO amp ──
        visemeAmount = Math.max(0, visemeAmount - delta * 6);
        currentVrm.expressionManager.setValue(currentViseme, visemeAmount);
        if (visemeAmount <= 0.01) {
          currentVrm.expressionManager.setValue(currentViseme, 0);
          currentViseme = null;
        }
      }
    }

    blinkTimer += delta;
    if (blinkPhase === 0 && blinkTimer >= nextBlinkAt) {
      blinkPhase = 1; blinkTimer = 0;
    } else if (blinkPhase === 1) {
      const t = Math.min(blinkTimer / 0.07, 1);
      currentVrm.expressionManager?.setValue('blink', t);
      if (t >= 1) { blinkPhase = 2; blinkTimer = 0; }
    } else if (blinkPhase === 2) {
      if (blinkTimer > 0.05) { blinkPhase = 3; blinkTimer = 0; }
    } else if (blinkPhase === 3) {
      const t = Math.min(blinkTimer / 0.10, 1);
      currentVrm.expressionManager?.setValue('blink', 1 - t);
      if (t >= 1) {
        blinkPhase = 0; blinkTimer = 0;
        nextBlinkAt = 2 + Math.random() * 4;
      }
    }

    currentVrm.update(delta);
  }

  try { renderer.render(scene, camera); } catch {}
}
animate();

window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  // Re-encuadrar cuando cambia el tamaño del iframe (panel resize)
  if (currentVrm) setupTorsoCamera(currentVrm);
});

window.parent.postMessage({ type: 'ashley3d:loaded' }, '*');
</script>
</body>
</html>
